<div id="pdfContent">

    <!-- HEADER -->
    <div class="header">
        <img src="./img/app-icon-192.png" class="logo" alt="Hisense logo">
        <div class="title">RTV REPORT</div>
        <div id="rtvId"></div>
    </div>

    <!-- INFO GRID -->
    <div class="info">
        <div><b>Vendor:</b> <span id="vendorPDF"></span></div>
        <div><b>Process:</b> <span id="processPDF"></span></div>
        <div><b>Line:</b> <span id="linePDF"></span></div>
        <div><b>Date:</b> <span id="datePDF"></span></div>
        <div><b>Inspector:</b> <span id="inspectorPDF"></span></div>
    </div>

    <!-- PARTS TABLE -->
    <table class="parts-table">
        <thead>
            <tr>
                <th>Part Number</th>
                <th>Description</th>
                <th>Qty</th>
                <th>Defect</th>
            </tr>
        </thead>
        <tbody id="partsRows"></tbody>
    </table>

    <!-- PHOTOS SECTION -->
    <div class="section">
        <div class="section-title">VENDOR REFERENCE</div>
        <div class="photo-box">
            <img id="vendorPhoto" src="img/no-image.png" alt="Vendor reference photo">
        </div>
    </div>

    <div class="section">
        <div class="section-title">WAREHOUSE USE ONLY</div>
        <div class="photo-box">
            <img id="warehousePhoto" src="img/no-image.png" alt="Warehouse photo">
        </div>
    </div>

    <div class="section">
        <div class="section-title">PFA SECTION</div>
        <div class="photo-box">
            <img id="pfaPhoto" src="img/no-image.png" alt="Issue photo">
        </div>
    </div>

</div>
